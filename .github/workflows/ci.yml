name: CI

# Validates what actually ships for this codebase:
#   - lint      : ESLint + Prettier over the app / api / server-handlers
#   - typecheck : tsc --noEmit over the frontend app (vite build does NOT typecheck)
#   - tests     : frontend + backend unit/integration suites
#   - build     : build:shared + build:frontend (mirrors the Vercel build command)
# The standalone booklet/ sub-project has its own toolchain and is excluded
# from the root lint/format scope.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Frontend app is the primary shipping artifact; `vite build` strips types
      # without checking them, so run an explicit no-emit typecheck here.
      # @shared/* resolves to packages/shared/src, so no build:shared is needed.
      - name: Typecheck frontend app
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Typecheck build config
        run: npx tsc --noEmit -p tsconfig.node.json

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Run frontend tests
        run: npm run test:frontend:run

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Run backend tests
        run: npm run test:backend:run
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-frontend, test-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Mirrors the Vercel build command (vercel.json:
      # "buildCommand": "npm run build:shared && npm run build:frontend").
      # `npm run build` runs both, plus a documented no-op backend step
      # (server-handlers ship via @vercel/node/esbuild, no compile step).
      - name: Build all packages
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            dist/
            packages/*/dist/
          retention-days: 7
